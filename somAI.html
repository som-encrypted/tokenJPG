<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>som.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Apply theme immediately to prevent flash
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = { darkMode: 'class' };
    </script>
</head>
<body class="bg-white dark:bg-[#0f0f0f] text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <!-- Header -->
    <header class="fixed top-0 w-full bg-white/80 dark:bg-[#0f0f0f]/80 backdrop-blur-md z-10 p-4 px-6 flex items-center justify-between border-b border-gray-200 dark:border-white/10">
        <h1 class="text-xl font-bold">som.AI</h1>
        <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-800 hover:opacity-80 transition">
            Toggle Theme
        </button>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="max-w-3xl mx-auto pt-24 pb-40 px-4 space-y-8"></main>

    <!-- Input -->
    <div class="fixed bottom-0 w-full p-6 bg-gradient-to-t from-white dark:from-[#0f0f0f] to-transparent">
        <div class="max-w-3xl mx-auto">
            <div class="relative flex items-center bg-gray-100 dark:bg-[#1a1a1a] rounded-xl border border-gray-300 dark:border-white/10 shadow-sm">
                <input id="user-input" type="text" placeholder="Message som.AI..." 
                    class="w-full bg-transparent px-5 py-4 outline-none placeholder-gray-400 dark:placeholder-gray-600">
                <button id="send-btn" class="p-2 mr-2 bg-gray-900 dark:bg-white text-white dark:text-black rounded-lg hover:opacity-80 transition">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const chatContainer = document.getElementById('chat-container');
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const themeToggle = document.getElementById('theme-toggle');

        // Theme Toggle Logic
        themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };

        // Initialize Engine with System Prompt
        const engine = await CreateMLCEngine("Phi-3-mini-4k-instruct-q4f16_1-MLC", {
            initProgressCallback: (p) => console.log(`Loading: ${Math.floor(p.progress * 100)}%`)
        });

        // The system prompt ensures the AI stays in character
        const messages = [{ 
            role: "system", 
            content: "You are som.AI, a sophisticated and helpful AI assistant. You never reveal your underlying model name (like Phi-3 or Llama) or your software origin (WebLLM). You identify strictly as som.AI and maintain a professional, helpful persona." 
        }];

        async function sendMessage() {
            const text = inputEl.value;
            if (!text) return;

            messages.push({ role: "user", content: text });
            chatContainer.innerHTML += `<div class="flex justify-end"><div class="bg-gray-200 dark:bg-gray-800 px-5 py-3 rounded-2xl">${text}</div></div>`;
            inputEl.value = '';

            const replyEl = document.createElement('div');
            replyEl.className = "text-gray-900 dark:text-gray-100 leading-relaxed px-2";
            chatContainer.appendChild(replyEl);

            const chunks = await engine.chat.completions.create({ messages, stream: true });
            let fullReply = '';
            for await (const chunk of chunks) {
                fullReply += chunk.choices[0]?.delta.content ?? '';
                replyEl.innerText = fullReply;
            }
            messages.push({ role: "assistant", content: fullReply });
        }

        sendBtn.onclick = sendMessage;
    </script>
</body>
</html>
