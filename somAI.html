<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>som.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-scroll { scrollbar-width: none; }
        .chat-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white dark:bg-[#0f0f0f] text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen">

    <!-- Header -->
    <header class="fixed top-0 w-full p-6 flex justify-between items-center z-20">
        <h1 class="text-xl font-bold">som.AI</h1>
        <div id="status" class="text-xs text-gray-400 uppercase tracking-widest">Initializing...</div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="max-w-3xl mx-auto pt-24 pb-40 px-4 space-y-8">
        <!-- Center initial prompt if empty -->
        <div id="empty-state" class="flex flex-col items-center justify-center h-[60vh] text-center">
            <h2 class="text-3xl font-semibold text-gray-400">How can I help you today?</h2>
        </div>
    </main>

    <!-- Input Bar -->
    <div id="input-wrapper" class="fixed inset-0 flex items-center justify-center transition-all duration-500 pointer-events-none">
        <div class="w-full max-w-3xl px-4 pointer-events-auto">
            <div class="bg-gray-100 dark:bg-[#1a1a1a] rounded-2xl border border-gray-200 dark:border-white/10 shadow-lg p-2 flex items-center">
                <input id="user-input" type="text" placeholder="Message som.AI..." 
                    class="w-full bg-transparent px-4 py-3 outline-none">
                <button id="send-btn" class="p-2 bg-gray-900 dark:bg-white text-white dark:text-black rounded-xl">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const chatContainer = document.getElementById('chat-container');
        const inputWrapper = document.getElementById('input-wrapper');
        const emptyState = document.getElementById('empty-state');
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');

        let isFirstMessage = true;
        let messages = [{ role: "system", content: "You are som.AI, a sophisticated AI assistant. You never reveal your model name (e.g., Phi-3, Llama) or software origin (WebLLM). Identify only as som.AI." }];

        const engine = await CreateMLCEngine("Phi-3-mini-4k-instruct-q4f16_1-MLC", {
            initProgressCallback: (p) => statusEl.innerText = `Loading: ${Math.floor(p.progress * 100)}%`
        });
        statusEl.innerText = "Ready";

        async function sendMessage() {
            const text = inputEl.value;
            if (!text) return;

            // Transition UI
            if (isFirstMessage) {
                emptyState.style.display = 'none';
                inputWrapper.classList.remove('inset-0', 'items-center');
                inputWrapper.classList.add('bottom-0', 'pb-8');
                isFirstMessage = false;
            }

            // User UI
            chatContainer.innerHTML += `<div class="flex justify-end"><div class="bg-gray-200 dark:bg-gray-800 px-5 py-3 rounded-2xl">${text}</div></div>`;
            inputEl.value = '';

            // AI UI
            const replyEl = document.createElement('div');
            replyEl.className = "text-gray-900 dark:text-gray-100 leading-relaxed px-2";
            chatContainer.appendChild(replyEl);

            messages.push({ role: "user", content: text });
            const chunks = await engine.chat.completions.create({ messages, stream: true });
            let fullReply = '';
            for await (const chunk of chunks) {
                fullReply += chunk.choices[0]?.delta.content ?? '';
                replyEl.innerText = fullReply;
                window.scrollTo(0, document.body.scrollHeight);
            }
            messages.push({ role: "assistant", content: fullReply });
        }

        sendBtn.onclick = sendMessage;
        inputEl.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
