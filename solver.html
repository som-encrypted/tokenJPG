<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="tokenjpg Organic Solver - Premium Class 11th & 12th organic chemistry reaction engine.">
    <title>tokenjpg | Organic Chemistry Solver</title>
    
    <!-- External Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    
    <style>
        :root {
            --bg-deep: #0b0f19;
            --bg-surface: #131a2c;
            --bg-surface-hover: #1c263f;
            --accent-emerald: #10b981; 
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --border-line: rgba(255, 255, 255, 0.05);
            --sidebar-width: 340px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .app-container { display: flex; width: 100%; height: 100vh; }

        /* Sidebar Styling */
        .sidebar { width: var(--sidebar-width); background: #0e1322; border-right: 1px solid var(--border-line); display: flex; flex-direction: column; padding: 24px; z-index: 10; }
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .back-link { text-decoration: none; color: var(--text-secondary); font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-line); }

        .injector-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-line); border-radius: 12px; padding: 14px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .injector-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .injector-row { display: flex; gap: 8px; }
        .injector-input { flex-grow: 1; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-line); border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 0.85rem; outline: none; }
        .injector-select { background: #131a2c; border: 1px solid var(--border-line); border-radius: 8px; padding: 8px; color: var(--text-secondary); font-size: 0.8rem; }
        .injector-btn { background: var(--accent-emerald); border: none; color: #042f1a; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; }

        .search-wrapper { position: relative; margin-bottom: 16px; }
        .search-box { width: 100%; padding: 12px 12px 12px 40px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-line); border-radius: 12px; color: white; outline: none; }

        .filter-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .filter-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-line); color: var(--text-secondary); padding: 8px; border-radius: 8px; cursor: pointer; }
        .filter-btn.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-color: rgba(59, 130, 246, 0.4); }

        .chem-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chem-item { background: var(--bg-surface); border: 1px solid var(--border-line); padding: 12px 16px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .chem-formula { font-family: 'JetBrains Mono', monospace; color: var(--accent-emerald); font-size: 0.8rem; background: rgba(16, 185, 129, 0.06); padding: 4px 8px; border-radius: 6px; }

        /* Workspace Layout */
        .workspace { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-deep); }
        .workspace-header { padding: 24px 40px; border-bottom: 1px solid var(--border-line); display: flex; justify-content: space-between; background: #0e1322; }
        .solver-logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #ffffff 30%, #a7f3d0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; gap: 8px; padding: 20px 40px 0 40px; }
        .tab-btn { background: none; border: 1px solid transparent; color: var(--text-secondary); padding: 10px 20px; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: var(--bg-surface); color: var(--accent-blue); border: 1px solid var(--border-line); border-bottom-color: var(--bg-surface); }

        .panel-container { flex-grow: 1; padding: 0 40px 40px 40px; overflow-y: auto; }
        .panel-wrapper-card { background: var(--bg-surface); border: 1px solid var(--border-line); border-radius: 0 16px 16px 16px; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
        .panel { display: none; }
        .panel.active { display: flex; flex-direction: column; gap: 20px; }

        .sandbox-area { background: rgba(7, 10, 19, 0.4); border: 2px dashed rgba(255, 255, 255, 0.06); border-radius: 14px; padding: 30px; min-height: 110px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; }
        .selected-badge { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 8px 16px; border-radius: 30px; display: flex; align-items: center; gap: 10px; }
        
        .theory-textarea { width: 100%; height: 130px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-line); border-radius: 12px; color: #fff; padding: 16px; font-family: inherit; resize: none; }
        .action-btn { background: var(--accent-emerald); color: #042f1a; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .output-console { background: #090d16; border: 1px solid var(--border-line); border-radius: 14px; padding: 24px; line-height: 1.7; min-height: 200px; }
        .loading-dots { display: flex; align-items: center; gap: 4px; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><a href="#" class="back-link">Hub Portal</a></div>
            <div class="injector-card">
                <div class="injector-title">Inject Custom Compound</div>
                <div class="injector-row"><input type="text" id="injName" class="injector-input" placeholder="Name"><input type="text" id="injFormula" class="injector-input" placeholder="Formula"></div>
                <div class="injector-row"><select id="injType" class="injector-select"><option value="organic">Organic</option><option value="reagent">Reagent</option></select><button class="injector-btn" onclick="injectCustomCompound()">Inject</button></div>
            </div>
            <div class="search-wrapper"><input type="text" id="searchBar" class="search-box" placeholder="Search..." oninput="filterChemicals()"></div>
            <div class="filter-container">
                <button class="filter-btn active" onclick="filterType('all', event)">All</button>
                <button class="filter-btn" onclick="filterType('organic', event)">Organic</button>
            </div>
            <div class="chem-list" id="chemList"></div>
        </aside>

        <main class="workspace">
            <header class="workspace-header"><div class="solver-logo">tokenjpg solver</div></header>
            <nav class="tabs">
                <button class="tab-btn active" onclick="switchTab('equation')">Equation Predictor</button>
                <button class="tab-btn" onclick="switchTab('theory')">Theory Q&A</button>
            </nav>
            <div class="panel-container">
                <div class="panel-wrapper-card">
                    <div id="equation-panel" class="panel active">
                        <div class="sandbox-area" id="sandbox">Load items to predict.</div>
                        <button class="action-btn" onclick="predictReaction()">Predict Matrix</button>
                    </div>
                    <div id="theory-panel" class="panel">
                        <textarea id="theoryQuestion" class="theory-textarea"></textarea>
                        <button class="action-btn" onclick="solveTheory()">Consult Solver</button>
                    </div>
                    <div class="output-console">
                        <div id="output-text" class="output-text-content">Results will appear here.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chemicalDb = [
            { name: "Methane", formula: "CH4", type: "organic" },
            { name: "Ethane", formula: "C2H6", type: "organic" },
            { name: "Ethanol", formula: "C2H5OH", type: "organic" }
        ];

        let selectedReactants = [];
        let currentFilter = 'all';

        function renderList(items) {
            const listEl = document.getElementById('chemList');
            listEl.innerHTML = items.map(item => `
                <div class="chem-item" onclick="addReactant('${item.formula}')">
                    <span class="chem-name">${item.name}</span>
                    <span class="chem-formula">${item.formula}</span>
                </div>
            `).join('');
        }

        async function runChemistryInference(systemInstructions, userPrompt, triggerButtonId) {
            const outputText = document.getElementById('output-text');
            outputText.innerHTML = "Processing...";
            
            const payload = {
                messages: [{ role: "system", content: systemInstructions }, { role: "user", content: userPrompt }],
                model: "openai"
            };

            try {
                const response = await fetch("https://text.pollinations.ai/", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const text = await response.text();
                outputText.innerHTML = formatMarkdownOutput(text);
                
                // Trigger MathJax re-render
                if (window.MathJax) {
                    MathJax.typesetPromise();
                }
            } catch (err) {
                outputText.innerText = "Error: API connection failed.";
            }
        }

        function formatMarkdownOutput(text) {
            // Converts basic bold and code tags
            let html = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code>$1</code>');
            return html;
        }

        function addReactant(formula) { if (!selectedReactants.includes(formula)) { selectedReactants.push(formula); updateSandbox(); } }
        
        function updateSandbox() {
            document.getElementById('sandbox').innerHTML = selectedReactants.map(r => `
                <div class="selected-badge">${r}</div>`).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id.includes(tab)));
        }

        function predictReaction() {
            const prompt = `Predict the reaction for: ${selectedReactants.join(' + ')}. Use MathJax for formulas (e.g., $CH_3CH_2OH$).`;
            runChemistryInference("You are a chemistry tutor.", prompt, 'predict-btn');
        }

        function solveTheory() {
            const val = document.getElementById('theoryQuestion').value;
            runChemistryInference("You are a chemistry tutor.", val, 'theory-btn');
        }

        renderList(chemicalDb);
    </script>
</body>
</html>
