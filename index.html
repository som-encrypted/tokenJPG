<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tokenJPG Suite | Portal Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .welcome-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            text-align: center;
            box-sizing: border-box;
        }

        .welcome-logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 2px;
            letter-spacing: -1px;
        }

        .welcome-sublogo {
            color: #4ade80;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            font-family: monospace;
        }

        .welcome-tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .hub-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hub-btn {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 14px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: inherit;
        }

        .hub-btn:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-2px);
        }

        .hub-icon { font-size: 2.2rem; }
        .hub-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 2px; }
        .hub-desc { font-size: 0.85rem; color: var(--text-muted); }

        .about-divider {
            margin: 25px 0 15px 0;
            border: 0;
            border-top: 1px solid var(--border);
        }

        .about-credits {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .about-credits strong {
            color: var(--text);
        }

        .india-footer {
            margin-top: 25px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
        }
        .flag-colors {
            display: inline-block;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="welcome-logo">tokenJPG Suite</div>
        <div class="welcome-sublogo">som.ai</div>
        <div class="welcome-tagline">Secure Workspace Ecosystem</div>
        
        <div class="hub-options">
            <a href="vault.html" class="hub-btn">
                <span class="hub-icon">📸</span>
                <div>
                    <div class="hub-title">Secure Image Vault</div>
                    <div class="hub-desc">Local E2EE browser compression drops & key retrieval.</div>
                </div>
            </a>

            <a href="chat.html" class="hub-btn">
                <span class="hub-icon">💬</span>
                <div>
                    <div class="hub-title">Real-Time Messaging</div>
                    <div class="hub-desc">Instant room creation using quick synchronized codes.</div>
                </div>
            </a>
        </div>

        <hr class="about-divider">
        
        <div class="about-credits">
            <strong>Created by:</strong> Ankur
        </div>
    </div>

    <div class="india-footer">
        🧡 Made in India 🤍 💚
    </div>

</body>
</html>
