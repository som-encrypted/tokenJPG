<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tokenJPG | Portal Hub</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .welcome-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            text-align: center;
            box-sizing: border-box;
            position: relative; /* Allows positioning the dots inside the card */
        }

        /* Three-Dot Menu Button positioned inside the main card top-right */
        .menu-dots-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            cursor: pointer;
            font-size: 1.8rem;
            color: var(--text-muted);
            user-select: none;
            transition: color 0.2s ease;
            line-height: 1;
            z-index: 10;
        }
        .menu-dots-btn:hover {
            color: var(--text);
        }

        .welcome-logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 2px;
            letter-spacing: -1px;
            margin-top: 10px; /* Gives space for the dots above */
        }

        .welcome-sublogo {
            color: #4ade80;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            font-family: monospace;
        }

        .welcome-tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .hub-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hub-btn {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 14px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: inherit;
        }

        .hub-btn:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-2px);
        }

        .hub-icon { font-size: 2.2rem; }
        .hub-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 2px; }
        .hub-desc { font-size: 0.85rem; color: var(--text-muted); }

        /* Modal Popup Overlay Styles */
        .modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(8px); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 20px; 
            max-width: 400px; 
            width: 85%; 
            border: 1px solid var(--border); 
            text-align: center;
        }

        .about-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 2px 0;
        }

        .about-sublogo {
            color: #4ade80;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .about-credits {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }
        .about-credits strong {
            color: var(--text);
        }

        .india-footer {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .close-btn {
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 10px 25px;
            border-radius: 10px; 
            font-size: 0.95rem; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .close-btn:hover { 
            background: var(--accent-hover); 
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <!-- Three Dot Icon placed safely inside the card layout container -->
        <div class="menu-dots-btn" onclick="openAboutMenu()">⋮</div>

        <div class="welcome-logo">tokenJPG</div>
        <div class="welcome-sublogo">som.ai</div>
        <div class="welcome-tagline">Secure Workspace Ecosystem</div>
        
        <div class="hub-options">
            <a href="vault.html" class="hub-btn">
                <span class="hub-icon">📸</span>
                <div>
                    <div class="hub-title">Secure Image Vault</div>
                    <div class="hub-desc">Local E2EE browser compression drops & key retrieval.</div>
                </div>
            </a>

            <a href="chat.html" class="hub-btn">
                <span class="hub-icon">💬</span>
                <div>
                    <div class="hub-title">Real-Time Messaging</div>
                    <div class="hub-desc">Instant room creation using quick synchronized codes.</div>
                </div>
            </a>
        </div>
    </div>

    <!-- Hidden About Section Popup Modal -->
    <div id="about-modal" class="modal-overlay" onclick="closeAboutMenuOutside(event)">
        <div class="modal-content">
            <div class="about-title">tokenJPG</div>
            <div class="about-sublogo">som.ai</div>
            
            <div class="about-credits">
                <strong>Created by:</strong> Ankur
            </div>
            
            <div class="india-footer">
                🧡 Made in India 🤍 💚
            </div>
            
            <div style="margin-top: 25px;">
                <button class="close-btn" onclick="closeAboutMenu()">Close</button>
            </div>
        </div>
    </div>

    <script>
        function openAboutMenu() {
            document.getElementById('about-modal').style.display = 'flex';
        }

        function closeAboutMenu() {
            document.getElementById('about-modal').style.display = 'none';
        }

        // Close the panel if the user clicks anywhere outside the inner popup card box
        function closeAboutMenuOutside(event) {
            if (event.target === document.getElementById('about-modal')) {
                closeAboutMenu();
            }
        }
    </script>

</body>
</html>
